<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangGraph Chat</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chat-box { width: 100%; max-width: 600px; height: 400px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        #input-area { width: 100%; max-width: 600px; display: flex; }
        input { flex: 1; padding: 10px; }
        button { padding: 10px; }
    </style>
</head>
<body>
    <h1>LangGraph Chat</h1>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="message" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const sessionId = "session_" + Math.random().toString(36).substr(2, 9);
        async function sendMessage() {
            const input = document.getElementById('message');
            const chatBox = document.getElementById('chat-box');
            const message = input.value;
            if (!message) return;

            chatBox.innerHTML += `<div><b>You:</b> ${message}</div>`;
            input.value = '';

            const response = await fetch('/api/v1/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, session_id: sessionId })
            });
            const data = await response.json();
            chatBox.innerHTML += `<div><b>AI:</b> ${data.response}</div>`;
        }
    </script>
</body>
</html>
